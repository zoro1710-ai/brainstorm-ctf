description: |
  > The cipher named a recording: `mission_047`. Unit Zero logged its last 
  > real mission to a rosbag before everything went quiet. The answer is 
  > in there scattered.

  Inspect and replay the bag on your ROS 2 Humble machine. One obscure topic
  carries the flag **one character per message**, and the messages don't arrive
  in tidy order — reconstruct the sequence (by index / timestamp) to read it.

  **Topics aren't latched — start listening *before* you play, or you'll miss
  the messages published while you were still setting up.**

  ```
  git clone https://github.com/Y-Sanjana/nodezero.git node_zero_mission047
  ros2 bag info node_zero_mission047/mission_047

  # terminal 1 — start this FIRST and leave it running:
  ros2 topic echo <the-topic-info-revealed> > capture.log

  # terminal 2 — then play the bag:
  ros2 bag play node_zero_mission047/mission_047
  ```

  Missed some anyway? The bag doesn't change between runs — just replay it.

  ---
  Skills: `ros2 bag info/play`, `rosbag2_py` reader, ordering/reassembly.
  Flag format: `nodezero{...}`  •  Stage 5 of 10.

# ORGANIZER: PER-TEAM RANDOMIZE this one (see _templates/per-team-randomizer.py).
# Flag spread 1 char/msg across a decoy-heavy topic; reassemble by seq/stamp.
# Handoff: reconstructed message names a "packet capture" file for Stage 6 and
# states the XOR key = "the tail of what you just recovered." Author flag below.
flags:
  - nodezero{mission_047_reassembled}

hints:
  - content: "`ros2 bag info` lists the topics. Most are ordinary telemetry. One is not — it has a lot of tiny String messages. That's your channel."
    cost: 30
  - content: "Each message holds ONE character plus an index/timestamp. Collect them all, sort by that order, and concatenate. The end of the message tells you the key for next stage."
    cost: 60

requirements:
  - "L4 // CORRUPTED LOG"
