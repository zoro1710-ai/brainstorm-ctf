# CTFd stack for the NODE ZERO CTF (server-side only — participants never touch Docker).
# Local: `docker compose up -d` → http://localhost:8000
# Prod : put this behind a reverse proxy (Caddy/nginx) with TLS and set SECRET_KEY.
version: "3.8"

services:
  ctfd:
    image: ctfd/ctfd:latest
    restart: always
    ports:
      - "8000:8000"
    environment:
      - UPLOAD_FOLDER=/var/uploads
      - DATABASE_URL=mysql+pymysql://ctfd:ctfd@db/ctfd
      - REDIS_URL=redis://cache:6379
      - WORKERS=2
      - LOG_FOLDER=/var/log/CTFd
      - ACCESS_LOG=-
      - ERROR_LOG=-
      - REVERSE_PROXY=true
      - SECRET_KEY=CHANGE_ME_TO_A_LONG_RANDOM_STRING
    volumes:
      - ctfd_uploads:/var/uploads
      - ctfd_logs:/var/log/CTFd
    depends_on:
      - db
      - cache

  db:
    image: mariadb:10.11
    restart: always
    environment:
      - MARIADB_ROOT_PASSWORD=ctfd
      - MARIADB_USER=ctfd
      - MARIADB_PASSWORD=ctfd
      - MARIADB_DATABASE=ctfd
    volumes:
      - ctfd_db:/var/lib/mysql
    command: [mysqld, --character-set-server=utf8mb4, --collation-server=utf8mb4_unicode_ci, --wait_timeout=28800]

  cache:
    image: redis:7-alpine
    restart: always
    volumes:
      - ctfd_redis:/data

volumes:
  ctfd_uploads:
  ctfd_logs:
  ctfd_db:
  ctfd_redis:
