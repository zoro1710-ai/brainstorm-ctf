name: "L5 // MISSION 047"
author: "IEEE RAS · NODE ZERO"
category: "STAGE 5"
value: 500
type: standard
state: visible

description: |
  > The cipher named a recording: `mission_047`. Unit Zero logged its last 
  > real mission to a rosbag before everything went quiet. The answer is 
  > in there scattered.

  Inspect and replay the bag on your ROS 2 Humble machine. One obscure 
  topic carries the flag **one character per message**, and the messages 
  don't arrive in tidy order — reconstruct the sequence (by index / timestamp)
  to read it.

  Topics aren't latched — start listening *before* you play, or you'll miss the messages published while you were still setting up.

  ```
  git clone https://github.com/Y-Sanjana/nodezero.git node_zero_mission047
  ros2 bag info node_zero_mission047/mission_047

  # start this FIRST and leave it running:
  ros2 topic echo <the-topic-info-revealed> > capture.log

  # then play the bag: (Summon a second shell)
  ros2 bag play node_zero_mission047/mission_047
  ```

  Missed some anyway? The bag doesn't change between runs — just replay it.

  ---
  Skills: `ros2 bag info/play`, `rosbag2_py` reader, ordering/reassembly.
  Flag format: `nodezero{...}`  •  Stage 5 of 10.

# ORGANIZER: PER-TEAM RANDOMIZE this one (see _templates/per-team-randomizer.py).
# Flag spread 1 char/msg across a decoy-heavy topic; reassemble by seq/stamp.
# Handoff: reconstructed message names a "packet capture" file for Stage 6 and
# states the XOR key = "the tail of what you just recovered." Author flag below.
flags:
  - nodezero{last_flight}

hints:
  - content: "Run `ros2 bag info node_zero_mission047/mission_047`. Three topics are normal telemetry (`/battery_state`, `/imu/data`, `/diagnostics`). The odd one out is `/unit_zero/subcarrier` — a `std_msgs/String` topic with far more messages than the rest. That's your channel."
    cost: 20
  - content: "Subscribe to `/unit_zero/subcarrier` BEFORE you play the bag (topics aren't latched — starting late means missing whatever already went by): `ros2 topic echo /unit_zero/subcarrier > capture.log`, then in a second terminal `ros2 bag play node_zero_mission047/mission_047`."
    cost: 35
  - content: "Each `data:` line looks like `<index>:<character>` — one character, tagged with its position. Parse every `data:` line, split on the FIRST colon only (the character itself could be a colon), sort by the integer index, and join in order. What comes out is the flag directly — no cipher, just reordering."
    cost: 55

requirements:
  - "L4 // CORRUPTED LOG"
